name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux, docker]

    steps:
      - name: Notify Discord - Deploying
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
              -d '{"content": "🚀 **GitHub commit detected!** [View Commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\nRestarting server now, the bot may be down for a moment..."}' \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"
          fi

      - name: Pull and deploy
        run: |
          cd /home/rad/projects/cinnamon-gcal-listener
          git fetch origin main
          git reset --hard origin/main
          docker compose down
          docker compose up -d --build

      - name: Notify Discord - Success
        if: success()
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
              -d '{"content": "✅ **Update complete!** The server has been successfully restarted."}' \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"
          fi

      - name: Notify Discord - Failed
        if: failure()
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
              -d '{"content": "❌ **Deploy failed.** Check the GitHub Actions logs."}' \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"
          fi
